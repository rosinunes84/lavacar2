<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Cadastro - LavaCar</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    /* ESTILO DO FORMULÁRIO */
    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 0;
      font-family: 'Arial', sans-serif;
      background: linear-gradient(135deg, #007BFF, #00BFFF);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      background: #fff;
      padding: 30px 20px;
      border-radius: 15px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 400px;
      text-align: center;
    }

    h1 {
      margin-bottom: 20px;
      font-size: 28px;
      color: #333;
    }

    input, button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 8px;
      font-size: 14px;
    }

    input {
      border: 1px solid #ddd;
    }

    input:focus {
      border-color: #007BFF;
      outline: none;
    }

    button {
      background: #007BFF;
      color: #fff;
      border: none;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover { background: #0056b3; }

    #loader { display: none; margin-top: 10px; }

    .notification {
      margin-top: 15px;
      padding: 12px;
      border-radius: 8px;
      display: none;
      font-size: 14px;
    }

    .notification.success { background: #d4edda; color: #155724; }
    .notification.error { background: #f8d7da; color: #721c24; }

    p { margin-top: 15px; font-size: 14px; }
    p a { color: #007BFF; text-decoration: none; }
    p a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Cadastro</h1>

    <input type="text" id="nome" placeholder="Nome completo">
    <input type="email" id="email" placeholder="E-mail">
    <input type="password" id="senha" placeholder="Senha">
    <input type="password" id="confirmarSenha" placeholder="Confirmar senha">

    <button id="btnCadastrar">Cadastrar</button>

    <div id="loader">Processando...</div>
    <div id="notification" class="notification"></div>

    <p>Já tem conta? <a href="login.html">Login</a></p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script>
    const supabaseClient = supabase.createClient(
      'https://kiqvzarmwooveklezzfm.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtpcXZ6YXJtd29vdmVrbGV6emZtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDYwNjA0MTMsImV4cCI6MjA2MTYzNjQxM30.aW2IAN1xlL8HOZfKqZnGr-7Lw5Ay-AA4MwT-E7dK1A8'
    );

    function showNotification(message, type) {
      const notification = document.getElementById('notification');
      notification.textContent = message;
      notification.className = `notification ${type}`;
      notification.style.display = 'block';
    }

    let isSubmitting = false;

    async function cadastrar() {
      if (isSubmitting) return;

      const btn = document.getElementById('btnCadastrar');
      const loader = document.getElementById('loader');
      btn.disabled = true;
      loader.style.display = 'block';
      isSubmitting = true;

      const nome = document.getElementById('nome').value.trim();
      const email = document.getElementById('email').value.trim();
      const senha = document.getElementById('senha').value.trim();
      const confirmarSenha = document.getElementById('confirmarSenha').value.trim();

      if (!nome || !email || !senha || !confirmarSenha) {
        showNotification('Por favor, preencha todos os campos.', 'error');
        resetForm();
        return;
      }

      if (senha !== confirmarSenha) {
        showNotification('As senhas não coincidem.', 'error');
        resetForm();
        return;
      }

      try {
        console.log("Tentando cadastrar usuário com email:", email);

        const { data, error } = await supabaseClient.auth.signUp({
          email,
          password: senha
        });

        console.log("Resposta do signUp:", { data, error });

        if (error) {
          showNotification('Erro no cadastro: ' + error.message, 'error');
          resetForm();
          return;
        }

        const user = data?.user;
        if (user) {
          console.log("Usuário criado:", user);

          const { error: dbError } = await supabaseClient
            .from('usuarios')
            .upsert([{ id: user.id, nome, email, role: 'cliente' }]);

          console.log("Resultado do insert no banco:", dbError || "Sucesso");

          if (dbError) {
            showNotification('Erro ao salvar no banco: ' + dbError.message, 'error');
          } else {
            showNotification('Cadastro realizado com sucesso! Verifique seu e-mail.', 'success');
            setTimeout(() => {
              window.location.href = 'login.html';
            }, 3000);
          }
        }
      } catch (err) {
        console.error("Erro inesperado:", err);
        showNotification('Erro inesperado: ' + err.message, 'error');
      } finally {
        resetForm();
      }
    }

    function resetForm() {
      const btn = document.getElementById('btnCadastrar');
      const loader = document.getElementById('loader');
      btn.disabled = false;
      loader.style.display = 'none';
      isSubmitting = false;
    }

    document.getElementById('btnCadastrar').addEventListener('click', cadastrar);
  </script>
</body>
</html>
