<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cadastro - LavaCar</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #1e90ff, #00bfff);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: white;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 0 15px rgba(0,0,0,0.2);
      width: 100%;
      max-width: 400px;
      text-align: center;
    }

    .logo {
      max-width: 120px;
      margin-bottom: 20px;
    }

    h2 {
      margin-bottom: 20px;
      color: #333;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 16px;
    }

    button {
      width: 100%;
      padding: 12px;
      background-color: #1e90ff;
      color: white;
      border: none;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
      font-size: 16px;
    }

    button:hover {
      background-color: #0f70d3;
    }

    .link {
      margin-top: 15px;
      display: block;
      color: #1e90ff;
      text-decoration: none;
      font-size: 14px;
    }

    .link:hover {
      text-decoration: underline;
    }

    #mensagem {
      margin-top: 15px;
      color: #333;
      font-weight: 600;
      min-height: 24px;
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="img/logo.png" alt="Logo LavaCar" class="logo" />
    <h2>Cadastro de Usuário</h2>
    <form id="signup-form">
      <input type="text" id="nome" name="nome" placeholder="Nome" required />
      <input type="email" id="email" name="email" placeholder="E-mail" required />
      <input type="password" id="senha" name="senha" placeholder="Senha" required />
      <button type="submit">Cadastrar</button>
    </form>
    <div id="mensagem"></div>
    <a class="link" href="login.html">Já tem conta? Faça login</a>
  </div>

  <script type="module" src="js/registro.js"></script>
</body>
</html>
