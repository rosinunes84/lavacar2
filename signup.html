<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Cadastro - LavaCar</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: 'Arial', sans-serif;
      background: linear-gradient(135deg, #007BFF, #00BFFF);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      background: #fff;
      padding: 30px 20px;
      border-radius: 15px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 400px;
      text-align: center;
      animation: fadeIn 1s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    h1 {
      margin-bottom: 20px;
      font-size: 28px;
      color: #333;
    }

    input {
      width: 100%;
      padding: 12px 15px;
      margin: 10px 0;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      transition: 0.3s;
    }

    input:focus {
      border-color: #007BFF;
      outline: none;
      box-shadow: 0 0 5px rgba(0,123,255,0.5);
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 15px;
      margin-bottom: 10px;
      background: #007BFF;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #0056b3;
    }

    button:disabled {
      background: #cccccc;
      cursor: not-allowed;
    }

    #loader {
      display: none;
      margin-top: 10px;
      color: #555;
      font-size: 14px;
    }

    .notification {
      margin-top: 15px;
      padding: 12px;
      border-radius: 8px;
      display: none;
      font-size: 14px;
    }

    .notification.success {
      background-color: #d4edda;
      color: #155724;
    }

    .notification.error {
      background-color: #f8d7da;
      color: #721c24;
    }

    p {
      margin-top: 15px;
      font-size: 14px;
    }

    p a {
      color: #007BFF;
      text-decoration: none;
    }

    p a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Cadastro</h1>

    <input type="text" id="nome" placeholder="Nome completo">
    <input type="email" id="email" placeholder="E-mail">
    <input type="password" id="senha" placeholder="Senha">
    <input type="password" id="confirmarSenha" placeholder="Confirmar senha">

    <button id="btnCadastrar">Cadastrar</button>

    <div id="loader">Processando...</div>
    <div id="notification" class="notification"></div>

    <p>Já tem conta? <a href="login.html">Login</a></p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script>
    const supabaseClient = supabase.createClient(
      'https://kiqvzarmwooveklezzfm.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtpcXZ6YXJtd29vdmVrbGV6emZtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDYwNjA0MTMsImV4cCI6MjA2MTYzNjQxM30.aW2IAN1xlL8HOZfKqZnGr-7Lw5Ay-AA4MwT-E7dK1A8'
    );

    function showNotification(message, type) {
      const notification = document.getElementById('notification');
      notification.textContent = message;
      notification.className = `notification ${type}`;
      notification.style.display = 'block';
    }

    async function cadastrar() {
      const btn = document.getElementById('btnCadastrar');
      const loader = document.getElementById('loader');
      btn.disabled = true;
      loader.style.display = 'block';

      const nome = document.getElementById('nome').value.trim();
      const email = document.getElementById('email').value.trim();
      const senha = document.getElementById('senha').value.trim();
      const confirmarSenha = document.getElementById('confirmarSenha').value.trim();

      if (!nome || !email || !senha || !confirmarSenha) {
        showNotification('Por favor, preencha todos os campos.', 'error');
        btn.disabled = false;
        loader.style.display = 'none';
        return;
      }

      if (senha !== confirmarSenha) {
        showNotification('As senhas não coincidem.', 'error');
        btn.disabled = false;
        loader.style.display = 'none';
        return;
      }

      try {
        const { data, error } = await supabaseClient.auth.signUp({
          email,
          password: senha
        });

        if (error) {
          showNotification('Erro no cadastro: ' + error.message, 'error');
          btn.disabled = false;
          loader.style.display = 'none';
          return;
        }

        const user = data.user;

        if (user) {
          const { error: dbError } = await supabaseClient
            .from('usuarios')
            .upsert([{ id: user.id, nome, email, role: 'cliente' }]);

          if (dbError) {
            showNotification('Erro ao salvar no banco: ' + dbError.message, 'error');
          } else {
            showNotification('Cadastro realizado com sucesso! Verifique seu Email para confirmar sua conta!', 'success');
            setTimeout(() => {
              window.location.href = 'login.html';
            }, 2000);
          }
        }
      } catch (err) {
        showNotification('Erro inesperado: ' + err.message, 'error');
      } finally {
        btn.disabled = false;
        loader.style.display = 'none';
      }
    }

    document.getElementById('btnCadastrar').addEventListener('click', cadastrar);
  </script>
</body>
</html>
