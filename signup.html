<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Cadastro</title>
  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

    const supabase = createClient(
      'https://kiqvzarmwooveklezzfm.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtpcXZ6YXJtd29vdmVrbGV6emZtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDYwNjA0MTMsImV4cCI6MjA2MTYzNjQxM30.aW2IAN1xlL8HOZfKqZnGr-7Lw5Ay-AA4MwT-E7dK1A8'
    );

    document.addEventListener('DOMContentLoaded', () => {
      const form = document.getElementById('signup-form');

      form.addEventListener('submit', async (e) => {
        e.preventDefault();

        const nome = document.getElementById('nome').value.trim();
        const email = document.getElementById('email').value.trim();
        const senha = document.getElementById('senha').value;

        // 1. Cadastrar no auth
        const { data, error } = await supabase.auth.signUp({
          email: email,
          password: senha
        });

        if (error) {
          alert('Erro no cadastro: ' + error.message);
          return;
        }

        const user = data.user;
        console.log('Usuário cadastrado:', user);

        // 2. Salvar nome na tabela 'usuarios'
        const { error: dbError } = await supabase
          .from('usuarios')
          .insert([
            { id: user.id, nome: nome, role: 'usuario' }
          ]);

        if (dbError) {
          console.error('Erro ao salvar nome:', dbError);
          alert('Erro ao salvar nome: ' + dbError.message);
        } else {
          alert('Cadastro realizado com sucesso!');
          form.reset();
        }
      });
    });
  </script>
</head>
<body>
  <h1>Cadastro</h1>
  <form id="signup-form">
    <label for="nome">Nome:</label>
    <input type="text" id="nome" required><br><br>

    <label for="email">Email:</label>
    <input type="email" id="email" required><br><br>

    <label for="senha">Senha:</label>
    <input type="password" id="senha" required><br><br>

    <button type="submit">Cadastrar</button>
  </form>
</body>
</html>
