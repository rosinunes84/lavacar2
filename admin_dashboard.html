<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Dashboard Administrativa - Agendamentos</title>
  <script type="module" src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background: #f5f5f5;
      color: #333;
      max-width: 900px;
      margin: 0 auto;
    }
    .container {
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgb(0 0 0 / 0.1);
    }
    h1 {
      text-align: center;
      color: #0077cc;
      margin-bottom: 10px;
    }
    .btn {
      cursor: pointer;
      padding: 8px 15px;
      margin: 10px auto 20px auto;
      display: block;
      border: none;
      border-radius: 6px;
      font-weight: bold;
      color: white;
      transition: background-color 0.3s ease;
      max-width: 200px;
      text-align: center;
      background-color: #0077cc;
    }
    .btn:hover {
      background-color: #005fa3;
    }
    .agendamento-item {
      background: #e8f0fe;
      padding: 15px 20px;
      border-radius: 8px;
      margin-bottom: 15px;
      box-shadow: 0 2px 6px rgb(0 119 204 / 0.2);
    }
    .agendamento-item p {
      margin: 5px 0;
    }
    .btn-editar {
      background-color: #0077cc;
    }
    .btn-editar:hover {
      background-color: #005fa3;
    }
    .btn-excluir {
      background-color: #cc3300;
    }
    .btn-excluir:hover {
      background-color: #a32900;
    }
    /* Modal styles */
    .modal {
      display: none; 
      position: fixed; 
      z-index: 9999; 
      left: 0; 
      top: 0; 
      width: 100%; 
      height: 100%; 
      overflow: auto; 
      background-color: rgba(0,0,0,0.5); 
    }
    .modal-content {
      background-color: #fff;
      margin: 10% auto;
      padding: 20px;
      border-radius: 10px;
      max-width: 400px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
      position: relative;
    }
    .modal-content h2 {
      margin-top: 0;
      color: #0077cc;
    }
    .modal-content label {
      display: block;
      margin: 10px 0 5px;
    }
    .modal-content input, 
    .modal-content select {
      width: 100%;
      padding: 8px;
      margin-bottom: 15px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
    }
    .modal-content .btn-save {
      background-color: #0077cc;
      width: 100%;
      padding: 10px;
      font-size: 16px;
    }
    .modal-content .btn-save:hover {
      background-color: #005fa3;
    }
    .close {
      position: absolute;
      right: 15px;
      top: 15px;
      font-size: 24px;
      font-weight: bold;
      cursor: pointer;
      color: #aaa;
      transition: color 0.3s ease;
    }
    .close:hover {
      color: #000;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Dashboard Administrativa - Agendamentos</h1>

    <!-- Botão separado para gerenciar serviços -->
    <button class="btn" onclick="window.location.href='gerenciar-servicos.html'">
      Gerenciar Serviços
    </button>

    <div id="listaAgendamentos"></div>
  </div>

  <!-- Modal Editar -->
  <div id="modalEditar" class="modal">
    <div class="modal-content">
      <span class="close" id="fecharModal">&times;</span>
      <h2>Editar Agendamento</h2>
      <form id="formEditar">
        <label for="data">Data:</label>
        <input type="date" id="data" name="data" required />

        <label for="periodo">Período:</label>
        <select id="periodo" name="periodo" required>
          <option value="Manhã">Manhã</option>
          <option value="Tarde">Tarde</option>
          <option value="Noite">Noite</option>
        </select>

        <label for="tipo_servico">Serviço:</label>
        <input type="text" id="tipo_servico" name="tipo_servico" required />

        <label for="status">Status:</label>
        <select id="status" name="status" required>
          <option value="Pendente">Pendente</option>
          <option value="Confirmado">Confirmado</option>
          <option value="Cancelado">Cancelado</option>
          <option value="Finalizado">Finalizado</option>
        </select>

        <button type="submit" class="btn btn-editar btn-save">Salvar</button>
      </form>
    </div>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

    // Substitua pelos seus dados do Supabase
    const supabaseUrl = 'https://kiqvzarmwooveklezzfm.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtpcXZ6YXJtd29vdmVrbGV6emZtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDYwNjA0MTMsImV4cCI6MjA2MTYzNjQxM30.aW2IAN1xlL8HOZfKqZnGr-7Lw5Ay-AA4MwT-E7dK1A8';
    const supabase = createClient(supabaseUrl, supabaseKey);

    let agendamentoEditandoId = null;

    // Verifica se está logado e sessão ativa
    async function verificarSessao() {
      const { data: sessionData, error } = await supabase.auth.getSession();

      if (error || !sessionData || !sessionData.session) {
        alert("Usuário não autenticado.");
        window.location.href = "index.html";
        return;
      }

      carregarAgendamentos();
    }

    // Carrega TODOS agendamentos (sem filtro)
    async function carregarAgendamentos() {
      const { data, error } = await supabase
        .from('agendamentos')
        .select('*, servico:servico_id (nome)')
        .order('data', { ascending: true });

      if (error) {
        console.error("Erro ao buscar agendamentos:", error);
        return;
      }

      const lista = document.getElementById("listaAgendamentos");
      lista.innerHTML = '';

      if (!data || data.length === 0) {
        lista.innerHTML = "<p>Nenhum agendamento encontrado.</p>";
        return;
      }

      data.forEach(agendamento => {
        const item = document.createElement("div");
        item.className = "agendamento-item";
        item.innerHTML = `
          <p><strong>ID:</strong> ${agendamento.id}</p>
          <p><strong>Usuário ID:</strong> ${agendamento.usuario_id}</p>
          <p><strong>Data:</strong> ${agendamento.data}</p>
          <p><strong>Período:</strong> ${agendamento.periodo}</p>
          <p><strong>Serviço:</strong> ${agendamento.tipo_servico}</p>
          <p><strong>Status:</strong> ${agendamento.status}</p>
          <button class="btn btn-editar" onclick="abrirModalEditar('${agendamento.id}', '${agendamento.data}', '${agendamento.periodo}', '${agendamento.tipo_servico}', '${agendamento.status}')">Editar</button>
          <button class="btn btn-excluir" onclick="excluirAgendamento('${agendamento.id}')">Excluir</button>
          <hr>
        `;
        lista.appendChild(item);
      });
    }

    // Abre modal e preenche dados
    window.abrirModalEditar = (id, data, periodo, tipo_servico, status) => {
      agendamentoEditandoId = id;
      document.getElementById('data').value = data;
      document.getElementById('periodo').value = periodo;
      document.getElementById('tipo_servico').value = tipo_servico;
      document.getElementById('status').value = status;
      document.getElementById('modalEditar').style.display = 'block';
    };

    // Fecha modal
    document.getElementById('fecharModal').onclick = () => {
      document.getElementById('modalEditar').style.display = 'none';
      agendamentoEditandoId = null;
    };

    // Fecha modal se clicar fora do conteúdo
    window.onclick = function(event) {
      const modal = document.getElementById('modalEditar');
      if (event.target == modal) {
        modal.style.display = "none";
        agendamentoEditandoId = null;
      }
    };

    // Salva alterações do agendamento
    document.getElementById('formEditar').addEventListener('submit', async (e) => {
      e.preventDefault();
      if (!agendamentoEditandoId) {
        alert("Erro: Nenhum agendamento selecionado.");
        return;
      }
      const data = document.getElementById('data').value;
      const periodo = document.getElementById('periodo').value;
      const tipo_servico = document.getElementById('tipo_servico').value;
      const status = document.getElementById('status').value;

      const { error } = await supabase
        .from('agendamentos')
        .update({ data, periodo, tipo_servico, status })
        .eq('id', agendamentoEditandoId);

      if (error) {
        alert("Erro ao atualizar agendamento: " + error.message);
      } else {
        alert("Agendamento atualizado com sucesso!");
        document.getElementById('modalEditar').style.display = 'none';
        agendamentoEditandoId = null;
        carregarAgendamentos();
      }
    });

    // Excluir agendamento
    window.excluirAgendamento = async (id) => {
      if (!confirm("Confirma a exclusão deste agendamento?")) return;

      const { error } = await supabase
        .from('agendamentos')
        .delete()
        .eq('id', id);

      if (error) {
        alert("Erro ao excluir agendamento: " + error.message);
      } else {
        alert("Agendamento excluído com sucesso!");
        carregarAgendamentos();
      }
    };

    verificarSessao();
  </script>
</body>
</html>
