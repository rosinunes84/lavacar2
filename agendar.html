<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Agendar Serviço - Lava-Car</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #121212;
      color: #eee;
      padding: 2rem;
      max-width: 480px;
      margin: auto;
    }
    .home-button {
      background-color: #1e90ff;
      color: white;
      padding: 0.5rem 1rem;
      border: none;
      border-radius: 6px;
      text-decoration: none;
      font-weight: bold;
      cursor: pointer;
      display: inline-block;
      margin: 1rem 0;
    }
    .home-button:hover {
      background-color: #0f67d1;
    }
    h1 {
      color: #1e90ff;
      text-align: center;
      margin-bottom: 1rem;
    }
    label {
      display: block;
      margin-top: 1rem;
      font-weight: bold;
    }
    input, select, button {
      width: 100%;
      padding: 0.6rem;
      margin-top: 0.4rem;
      border-radius: 6px;
      border: none;
      font-size: 1rem;
    }
    input, select {
      background-color: #222;
      color: #eee;
    }
    button {
      background-color: #1e90ff;
      color: white;
      cursor: pointer;
      margin-top: 1.5rem;
      font-weight: bold;
    }
    button:hover {
      background-color: #0f67d1;
    }
    #notificacao {
      margin-top: 1rem;
      padding: 0.75rem 1rem;
      border-radius: 6px;
      font-weight: bold;
      display: none;
    }
    #notificacao.sucesso {
      background-color: #28a745;
      color: white;
    }
    #notificacao.erro {
      background-color: #dc3545;
      color: white;
    }
  </style>
</head>
<body>

  <h1>Agendar Serviço</h1>

  <div style="text-align: center;">
    <a href="home.html" class="home-button">Home</a>
  </div>

  <form id="formAgendamento">
    <label for="data">Data</label>
    <input type="date" id="data" name="data" required />

    <label for="periodo">Período</label>
    <select id="periodo" name="periodo" required>
      <option value="">Selecione</option>
      <option value="Manhã">Manhã ( deixar até as 9:00hrs )</option>
      <option value="Tarde">Tarde ( deixar até as 13:00hrs )</option>
    </select>

    <label for="tipoServico">Serviço</label>
    <select id="tipoServico" name="tipoServico" required>
      <option value="">Carregando serviços...</option>
    </select>

    <label for="veiculo">Veículo (opcional)</label>
    <input type="text" id="veiculo" name="veiculo" placeholder="Ex: Carro, Moto..." />

    <div id="notificacao"></div>

    <button type="submit" id="btnAgendar">Agendar</button>
  </form>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

    const supabaseUrl = 'https://kiqvzarmwooveklezzfm.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtpcXZ6YXJtd29vdmVrbGV6emZtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDYwNjA0MTMsImV4cCI6MjA2MTYzNjQxM30.aW2IAN1xlL8HOZfKqZnGr-7Lw5Ay-AA4MwT-E7dK1A8';
    const supabase = createClient(supabaseUrl, supabaseKey);

    function mostrarNotificacao(mensagem, tipo) {
      const div = document.getElementById('notificacao');
      div.textContent = mensagem;
      div.className = tipo;
      div.style.display = 'block';

      setTimeout(() => {
        div.style.display = 'none';
      }, 10000);
    }

    async function verificarSessao() {
      const { data: { user }, error } = await supabase.auth.getUser();
      if (error || !user) {
        alert("Usuário não autenticado. Faça login para continuar.");
        window.location.href = 'index.html';
      } else {
        carregarServicos();
      }
    }

    async function carregarServicos() {
      const select = document.getElementById('tipoServico');
      select.innerHTML = '<option value="">Carregando serviços...</option>';

      const { data: servicos, error } = await supabase
        .from('servicos')
        .select('id, nome')
        .order('nome', { ascending: true });

      if (error) {
        select.innerHTML = '<option value="">Erro ao carregar serviços</option>';
        console.error('Erro:', error.message);
        return;
      }

      if (!servicos || servicos.length === 0) {
        select.innerHTML = '<option value="">Nenhum serviço disponível</option>';
        return;
      }

      select.innerHTML = '<option value="">Selecione</option>';
      servicos.forEach(servico => {
        const option = document.createElement('option');
        option.value = servico.id;
        option.textContent = servico.nome;
        select.appendChild(option);
      });
    }

    // Formata a data dd/mm/aaaa
    function formatarData(dataISO) {
      const partes = dataISO.split('-');
      return `${partes[2]}/${partes[1]}/${partes[0]}`;
    }

    document.getElementById('formAgendamento').addEventListener('submit', async (e) => {
      e.preventDefault();

      const btn = document.getElementById('btnAgendar');
      btn.disabled = true;
      btn.textContent = 'Agendando...';

      const { data: { user } } = await supabase.auth.getUser();
      if (!user) {
        alert("Usuário não autenticado.");
        window.location.href = 'index.html';
        return;
      }

      const dataAgendamento = document.getElementById('data').value;
      const periodo = document.getElementById('periodo').value;
      const servico_id = document.getElementById('tipoServico').value;
      const veiculo = document.getElementById('veiculo').value || 'Não informado';

      if (!dataAgendamento || !periodo || !servico_id) {
        mostrarNotificacao('Por favor, preencha todos os campos obrigatórios.', 'erro');
        btn.disabled = false;
        btn.textContent = 'Agendar';
        return;
      }

      // Buscar nome do serviço
      const { data: servicoData, error: servicoError } = await supabase
        .from('servicos')
        .select('nome')
        .eq('id', servico_id)
        .single();

      const servico_nome = servicoData ? servicoData.nome : 'Desconhecido';

      const dados = {
        usuario_id: user.id,
        data: dataAgendamento,
        periodo: periodo,
        servico_id: servico_id,
        veiculo: veiculo,
        status: "Pendente"
      };

      const { error } = await supabase.from('agendamentos').insert([dados]);

      if (error) {
        mostrarNotificacao('Erro ao agendar: ' + error.message, 'erro');
        console.error(error);
        btn.disabled = false;
        btn.textContent = 'Agendar';
      } else {
        mostrarNotificacao('Agendamento realizado com sucesso!', 'sucesso');

        // Definir nome do usuário para o email
        const usuario_nome = user.user_metadata?.full_name || user.email || 'Usuário';

        // Enviar notificação ao admin via EmailJS
        emailjs.send("service_n2fghu7", "template_eioflwb", {
          usuario_nome: usuario_nome,
          servico_nome: servico_nome,
          data: formatarData(dataAgendamento),
          periodo: periodo,
          veiculo: veiculo
        })
        .then(function(response) {
          console.log('E-mail enviado ao admin!', response.status, response.text);
        }, function(error) {
          console.error('Erro ao enviar e-mail:', error);
        });

        setTimeout(() => {
          window.location.href = 'meus-agendamentos.html';
        }, 2000);
      }
    });

    verificarSessao();
  </script>

  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

  <script type="text/javascript">
    (function(){
      emailjs.init("VNibsiGcVU9oTIwE8");  // sua public key do EmailJS
    })();
  </script>

</body>
</html>
