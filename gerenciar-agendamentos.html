<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gerenciar Agendamentos</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background-color: #f2f2f2;
    }

    h1 {
      text-align: center;
      color: #333;
    }

    .nav-buttons {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin: 20px 0;
    }

    .nav-buttons a {
      padding: 10px 20px;
      background-color: #3498db;
      color: white;
      text-decoration: none;
      border-radius: 5px;
      transition: background-color 0.3s ease;
    }

    .nav-buttons a:hover {
      background-color: #2980b9;
    }

    .agendamento-card {
      background-color: #fff;
      padding: 15px;
      margin-bottom: 10px;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
    }

    .agendamento-card p {
      margin: 5px 0;
    }

    .agendamento-card button {
      margin-right: 10px;
      padding: 6px 12px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    .btn-excluir {
      background-color: #e74c3c;
      color: white;
    }

    .btn-editar {
      background-color: #3498db;
      color: white;
    }

    #modal-edicao {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.5);
      z-index: 999;
      align-items: center;
      justify-content: center;
    }

    .modal-content {
      background-color: white;
      padding: 20px;
      border-radius: 10px;
      width: 90%;
      max-width: 400px;
      margin: 100px auto;
    }

    .modal-content label {
      display: block;
      margin: 10px 0 5px;
    }

    .modal-content input[type="text"],
    .modal-content input[type="date"],
    .modal-content input[type="time"],
    .modal-content select {
      width: 100%;
      padding: 8px;
      box-sizing: border-box;
      margin-bottom: 10px;
    }

    .modal-content button {
      margin-right: 10px;
      padding: 8px 16px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    .modal-content .btn-salvar {
      background-color: #2ecc71;
      color: white;
    }

    .modal-content .btn-cancelar {
      background-color: #95a5a6;
      color: white;
    }
  </style>
</head>
<body>
  <h1>Gerenciar Agendamentos</h1>

  <div class="nav-buttons">
    <a href="admin_dashboard.html">Voltar</a>
    <a href="home.html">Home</a>
  </div>

  <div id="lista-agendamentos">
    <p>Carregando agendamentos...</p>
  </div>

  <!-- Modal de Edição -->
  <div id="modal-edicao">
    <div class="modal-content">
      <h2>Editar Agendamento</h2>

      <input type="hidden" id="edit-id" />

      <label for="edit-nome">Nome do Cliente:</label>
      <input type="text" id="edit-nome" />

      <label for="edit-servico">Serviço:</label>
      <input type="text" id="edit-servico" />

      <label for="edit-data">Data:</label>
      <input type="date" id="edit-data" />

      <label for="edit-hora">Hora:</label>
      <input type="time" id="edit-hora" />

      <label for="edit-status">Status:</label>
      <select id="edit-status">
        <option value="pendente">Pendente</option>
        <option value="confirmado">Confirmado</option>
        <option value="cancelado">Cancelado</option>
        <option value="concluido">Concluído</option>
      </select>

      <button class="btn-salvar" onclick="salvarAlteracoes()">Salvar</button>
      <button class="btn-cancelar" onclick="fecharModal()">Cancelar</button>
    </div>
  </div>

  <script type="module" src="js/gerenciar_agendamentos.js"></script>
</body>
</html>
