<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Gerenciar Agendamentos</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #121212;
      color: #eee;
      padding: 2rem;
      margin: 0;
    }
    h1 {
      color: #1e90ff;
      text-align: center;
      margin-bottom: 2rem;
    }
    #lista-agendamentos {
      list-style: none;
      padding: 0;
      max-width: 700px;
      margin: 0 auto;
    }
    #lista-agendamentos li.agendamento {
      background-color: #1e1e1e;
      margin-bottom: 1rem;
      border-radius: 8px;
      padding: 1rem 1.5rem;
      box-shadow: 0 2px 6px rgba(0,0,0,0.6);
      transition: transform 0.2s;
      display: flex;
      flex-direction: column;
    }
    #lista-agendamentos li.agendamento:hover {
      transform: translateY(-3px);
    }
    #lista-agendamentos li.agendamento p {
      margin: 0.25rem 0;
      line-height: 1.3;
    }
    #lista-agendamentos li.agendamento strong {
      color: #1e90ff;
    }
    .acoes {
      margin-top: 1rem;
      display: flex;
      gap: 1rem;
    }
    .btn-editar, .btn-excluir {
      background-color: #1e90ff;
      border: none;
      color: white;
      padding: 0.5rem 1rem;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: background-color 0.3s;
      min-width: 100px;
      text-align: center;
    }
    .btn-excluir {
      background-color: #dc3545;
    }
    .btn-editar:hover {
      background-color: #0f67d1;
    }
    .btn-excluir:hover {
      background-color: #a71d2a;
    }
    @media(max-width: 500px) {
      #lista-agendamentos li.agendamento {
        padding: 1rem;
      }
      .acoes {
        flex-direction: column;
      }
      .btn-editar, .btn-excluir {
        width: 100%;
        min-width: unset;
      }
    }
  </style>
</head>
<body>
  <h1>Gerenciar Agendamentos</h1>

  <ul id="lista-agendamentos">
    <!-- Agendamentos serão listados aqui -->
  </ul>

  <script type="module" src="js/gerenciar_agendamentos.js"></script>
</body>
</html>
