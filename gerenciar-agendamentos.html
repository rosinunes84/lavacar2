<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Gerenciar Agendamentos</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f5f7fa;
      margin: 0;
      padding: 20px;
      color: #333;
    }
    h1 {
      text-align: center;
      margin-bottom: 20px;
      color: #2c3e50;
    }

    /* Container dos botões Voltar e Home */
    .nav-buttons {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-bottom: 15px;
      flex-wrap: wrap;
    }
    .nav-buttons a {
      display: inline-block;
      min-width: 100px;
      padding: 12px 18px;
      background-color: #3498db;
      color: white;
      text-align: center;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600;
      transition: background-color 0.3s ease;
      user-select: none;
    }
    .nav-buttons a:hover {
      background-color: #2980b9;
    }

    #lista-agendamentos {
      margin-top: 10px;
      overflow-x: auto;
    }
    table.agendamento-table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      border-radius: 6px;
      overflow: hidden;
    }
    table.agendamento-table thead {
      background: #2980b9;
      color: white;
      font-weight: bold;
    }
    table.agendamento-table th,
    table.agendamento-table td {
      padding: 12px 15px;
      text-align: left;
      border-bottom: 1px solid #ddd;
      vertical-align: middle;
    }
    table.agendamento-table tbody tr:hover {
      background: #ecf0f1;
    }
    table.agendamento-table th:first-child,
    table.agendamento-table td:first-child {
      text-align: center;
      width: 40px;
    }
    button {
      background-color: #3498db;
      border: none;
      color: white;
      padding: 6px 12px;
      margin: 0 2px;
      border-radius: 4px;
      cursor: pointer;
      transition: background-color 0.25s ease;
      font-size: 14px;
    }
    button:hover {
      background-color: #2980b9;
    }
    button.btn-excluir {
      background-color: #e74c3c;
    }
    button.btn-excluir:hover {
      background-color: #c0392b;
    }
    #btn-excluir-selecionados {
      display: none;
      margin-top: 15px;
      padding: 10px 18px;
      background-color: #e74c3c;
      border-radius: 6px;
      color: white;
      font-size: 16px;
      border: none;
      cursor: pointer;
      transition: background-color 0.25s ease;
      user-select: none;
      display: block;
      width: max-content;
      margin-left: auto;
    }
    #btn-excluir-selecionados:hover {
      background-color: #c0392b;
    }
    /* Checkbox maior e alinhado verticalmente */
    input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
      vertical-align: middle;
    }

    /* Responsividade */
    @media (max-width: 600px) {
      body {
        padding: 15px 10px;
      }
      .nav-buttons {
        gap: 10px;
      }
      .nav-buttons a {
        min-width: 45%;
        font-size: 14px;
        padding: 10px 12px;
      }
      table.agendamento-table th,
      table.agendamento-table td {
        padding: 8px 10px;
        font-size: 13px;
      }
      button {
        font-size: 13px;
        padding: 5px 10px;
      }
      #btn-excluir-selecionados {
        width: 100%;
        font-size: 15px;
        padding: 12px 0;
      }
    }
  </style>
</head>
<body>
  <h1>Gerenciar Agendamentos</h1>

  <div class="nav-buttons">
    <a href="admin_dashboard.html" aria-label="Voltar para o painel administrativo">Voltar</a>
    <a href="home.html" aria-label="Ir para a página inicial">Home</a>
  </div>

  <div id="lista-agendamentos">
    <!-- A tabela será injetada aqui pelo JavaScript -->
  </div>

  <button id="btn-excluir-selecionados" title="Excluir todos os agendamentos selecionados">
    Excluir Selecionados
  </button>

  <script type="module" src="js/gerenciar_agendamentos.js"></script>
</body>
</html>
