<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin Dashboard - Gerenciar Usuários</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background: #f5f5f5;
    }

    .nav-buttons {
      margin-bottom: 20px;
    }

    .nav-buttons a {
      display: inline-block;
      margin-right: 10px;
      padding: 10px 20px;
      background-color: #3366ff;
      color: white;
      text-decoration: none;
      border-radius: 5px;
      transition: background-color 0.3s ease;
    }

    .nav-buttons a:hover {
      background-color: #264d99;
    }

    h1 {
      margin-bottom: 20px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      margin-bottom: 20px;
    }

    th, td {
      padding: 12px;
      border: 1px solid #ddd;
      text-align: left;
    }

    th {
      background-color: #3366ff;
      color: white;
    }

    button {
      padding: 6px 12px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .btn-admin {
      background-color: #264d99;
      color: white;
    }

    .btn-cliente {
      background-color: #999;
      color: white;
    }
  </style>
</head>
<body>

  <div class="nav-buttons">
    <a href="gerenciar-usuarios.html">Voltar</a>
    <a href="home.html">Home</a>
  </div>

  <h1>Gerenciar Usuários</h1>

  <table>
    <thead>
      <tr>
        <th>Nome</th>
        <th>Email</th>
        <th>Role</th>
        <th>Ações</th>
      </tr>
    </thead>
    <tbody id="usuarios-tbody">
      <!-- Usuários serão carregados aqui -->
    </tbody>
  </table>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

    const supabase = createClient(
      'https://kiqvzarmwooveklezzfm.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtpcXZ6YXJtd29vdmVrbGV6emZtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDYwNjA0MTMsImV4cCI6MjA2MTYzNjQxM30.aW2IAN1xlL8HOZfKqZnGr-7Lw5Ay-AA4MwT-E7dK1A8'
    );

    const tbody = document.getElementById('usuarios-tbody');

    async function carregarUsuarios() {
      const { data, error } = await supabase
        .from('usuarios')
        .select('id, nome, email, role')
        .order('nome', { ascending: true });

      if (error) {
        alert('Erro ao carregar usuários: ' + error.message);
        return;
      }

      tbody.innerHTML = '';

      data.forEach(user => {
        const tr = document.createElement('tr');

        tr.innerHTML = `
          <td>${user.nome}</td>
          <td>${user.email}</td>
          <td>${user.role}</td>
          <td>
            <button class="${user.role === 'admin' ? 'btn-cliente' : 'btn-admin'}" data-id="${user.id}" data-role="${user.role}">
              Tornar ${user.role === 'admin' ? 'Cliente' : 'Admin'}
            </button>
          </td>
        `;

        tbody.appendChild(tr);
      });

      tbody.querySelectorAll('button').forEach(button => {
        button.addEventListener('click', async () => {
          const id = button.getAttribute('data-id');
          const roleAtual = button.getAttribute('data-role');
          const novaRole = roleAtual === 'admin' ? 'cliente' : 'admin';

          button.disabled = true;
          button.textContent = 'Atualizando...';

          const { error } = await supabase
            .from('usuarios')
            .update({ role: novaRole })
            .eq('id', id);

          if (error) {
            alert('Erro ao atualizar role: ' + error.message);
            button.disabled = false;
            button.textContent = `Tornar ${roleAtual === 'admin' ? 'Cliente' : 'Admin'}`;
            return;
          }

          carregarUsuarios();
        });
      });
    }

    carregarUsuarios();
  </script>
</body>
</html>
